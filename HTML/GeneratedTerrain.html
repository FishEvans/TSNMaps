
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeneratedTerrain.html</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        html, body { margin: 0; height: 100%; background: black; color: white; }
        /* === Description typography controls ===
           Tweak these two variables to change description sizes globally */
        :root {
            --desc-font-size: 130%;
            --hull-desc-font-size: 130%;
            --panel-bg: #24272d;
            --panel-border: rgba(255, 255, 255, 0.08);
            --toolbar-bg: rgba(12, 14, 18, 0.92);
            --toolbar-border: rgba(255, 255, 255, 0.12);
            --mobile-toolbar-height: 58px;
        }
        body { display: flex; height: 100vh; overflow: hidden; position: relative; }
        .desc-text { font-size: var(--desc-font-size); margin-top: 8px; }
        .hull-desc { font-size: var(--hull-desc-font-size); margin-top: 5px; color: #ccc; }
        .info-title { font-size: 26px; font-weight: bold; text-align: center; margin: 2px 0 6px; }
        .info-desc { font-size: 16px; color: #fff; }
        .info-meta { font-size: 12px; color: #ccc; }
        .info-meta-block { margin-bottom: 6px; }
        .info-section { margin-top: 6px; }
        #controls, #info {
            background: linear-gradient(180deg, rgba(43, 47, 56, 0.98), rgba(28, 31, 38, 0.98));
            border-right: 1px solid var(--panel-border);
            overflow-y: auto;
            padding: 10px 12px;
            box-sizing: border-box;
            scrollbar-gutter: stable;
        }
        #controls { flex: 1; min-width: 220px; max-width: 350px; }
        #plot {
            flex: 3;
            min-width: 0;
            position: relative;
            background:
                radial-gradient(circle at top, rgba(0, 188, 212, 0.12), transparent 38%),
                radial-gradient(circle at bottom, rgba(255, 196, 0, 0.08), transparent 34%),
                #050608;
        }
        #info {
            flex: 1;
            min-width: 240px;
            border-right: none;
            border-left: 1px solid var(--panel-border);
        }
        #mobile-toolbar {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 30;
            height: var(--mobile-toolbar-height);
            padding: env(safe-area-inset-top, 0) 12px 10px;
            background: var(--toolbar-bg);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--toolbar-border);
            box-sizing: border-box;
            align-items: center;
            gap: 10px;
        }
        #mobile-title {
            flex: 1;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .mobile-toggle {
            width: auto;
            min-width: 86px;
            margin: 0;
            padding: 10px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            text-align: center;
        }
        #panel-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 25;
            background: rgba(3, 5, 9, 0.58);
            backdrop-filter: blur(3px);
        }
        #grid-readout {
            position: absolute;
            display: none;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid #00bcd4;
            border-radius: 4px;
            color: #00e5ff;
            font-weight: bold;
            font-size: 16px;
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
        }
        #author-tooltip {
            position: absolute;
            display: none;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid #00bcd4;
            border-radius: 4px;
            color: #00e5ff;
            font-weight: bold;
            font-size: 16px;
            pointer-events: none;
            z-index: 11;
            white-space: nowrap;
        }
        h2.header { margin-top: 0; margin-bottom: 5px; text-align: center; }
        h3.subheader { margin-top: 0; margin-bottom: 15px; text-align: center; color: #ccc; }
        .alignment-image { display: block; max-width: 100%; height: auto; margin: 10px auto; }
        button {
            display: block;
            width: 100%;
            margin-bottom: 5px;
            background: #555;
            color: white;
            border: none;
            padding: 8px 10px;
            text-align: left;
            cursor: pointer;
            font-size: 20px;
            border-radius: 10px;
        }
        button.header { background: #444; cursor: default; font-size: 24px; }
        #search-box {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 10px;
            font-size: 16px;
            box-sizing: border-box;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.06);
            color: white;
        }
        #search-box::placeholder { color: rgba(255, 255, 255, 0.6); }
        @media (max-width: 900px) {
            body { display: block; }
            #mobile-toolbar { display: flex; }
            #controls, #info {
                position: fixed;
                top: 0;
                bottom: 0;
                z-index: 40;
                width: min(86vw, 360px);
                max-width: none;
                min-width: 0;
                padding:
                    calc(var(--mobile-toolbar-height) + env(safe-area-inset-top, 0) + 12px)
                    14px
                    calc(18px + env(safe-area-inset-bottom, 0));
                box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
                transition: transform 0.24s ease;
            }
            #controls {
                left: 0;
                border-right: 1px solid var(--panel-border);
                transform: translateX(-104%);
            }
            #info {
                right: 0;
                border-left: 1px solid var(--panel-border);
                transform: translateX(104%);
            }
            body.drawer-left-open #controls { transform: translateX(0); }
            body.drawer-right-open #info { transform: translateX(0); }
            body.drawer-left-open #panel-overlay,
            body.drawer-right-open #panel-overlay { display: block; }
            #plot {
                position: fixed;
                inset: 0;
                width: 100vw;
                height: 100vh;
            }
            .info-title { font-size: 22px; }
            .info-desc, .desc-text, .hull-desc { font-size: 15px; }
            button { font-size: 17px; }
            button.header { font-size: 20px; }
        }
    </style>
</head>

    <div id="mobile-toolbar">
        <button id="mobile-controls-btn" class="mobile-toggle" type="button">Objects</button>
        <div id="mobile-title">GeneratedTerrain</div>
        <button id="mobile-info-btn" class="mobile-toggle" type="button">Info</button>
    </div>
    <div id="panel-overlay"></div>
    <div id="controls">
        <div id="gm-controls" style="margin-bottom:10px;"></div>
        <h2 class="header">GeneratedTerrain</h2>
        <h3 class="subheader">Alignment: USFP</h3>
        <img src="Images/Factions/USFP.png" alt="Alignment Logo" class="alignment-image" onerror="this.style.display='none';">

        <input type="text" id="search-box" placeholder="Search objects...">
        <div id="object-buttons">
    </div>
    </div>
    <div id="plot"></div>
    <div id="info">
        <img src="Images/Compass.png" alt="Compass" style="display:block; max-width:100%; height:auto; margin-bottom:10px;">
        <button id="galactic-map-btn" title="Back to Galactic Map">Show Galactic Map</button>
        Loading system info...
    </div>
<script>
    var objData = {};
    var systemMeta = {"system_name": "GeneratedTerrain", "description": "Autogenerated terrain (small, 300000 radius) on 2026-01-24.", "exports": [], "assets": [], "focus": "", "intel": {"pirate": "Low", "enemy": "Low"}, "original_author": "Fish Evans", "last_author": "Fish Evans", "revision_number": 15, "version_tag": "29126.15", "all_authors": ["Fish Evans"]};
    var pageBody = document.body;
        console.log("[DEBUG JS] objData keys:", Object.keys(objData));
        console.log("[DEBUG JS] objData sample:", objData[Object.keys(objData)[0]]);

    function isMobileLayout() {
        return window.matchMedia('(max-width: 900px)').matches;
    }

    function closePanels() {
        pageBody.classList.remove('drawer-left-open', 'drawer-right-open');
        syncMobileToggles();
    }

    function openControlsPanel() {
        if (!isMobileLayout()) return;
        pageBody.classList.add('drawer-left-open');
        pageBody.classList.remove('drawer-right-open');
        syncMobileToggles();
    }

    function openInfoPanel() {
        if (!isMobileLayout()) return;
        pageBody.classList.add('drawer-right-open');
        pageBody.classList.remove('drawer-left-open');
        syncMobileToggles();
    }

    function toggleControlsPanel() {
        if (!isMobileLayout()) return;
        var willOpen = !pageBody.classList.contains('drawer-left-open');
        closePanels();
        if (willOpen) {
            pageBody.classList.add('drawer-left-open');
        }
        syncMobileToggles();
    }

    function toggleInfoPanel() {
        if (!isMobileLayout()) return;
        var willOpen = !pageBody.classList.contains('drawer-right-open');
        closePanels();
        if (willOpen) {
            pageBody.classList.add('drawer-right-open');
        }
        syncMobileToggles();
    }

    function syncMobileToggles() {
        var controlsBtn = document.getElementById('mobile-controls-btn');
        var infoBtn = document.getElementById('mobile-info-btn');
        if (!controlsBtn || !infoBtn) return;
        controlsBtn.setAttribute('aria-expanded', pageBody.classList.contains('drawer-left-open') ? 'true' : 'false');
        infoBtn.setAttribute('aria-expanded', pageBody.classList.contains('drawer-right-open') ? 'true' : 'false');
    }

    function safeText(value, fallback) {
        if (value === undefined || value === null || value === '') return fallback;
        return value;
    }

    function listOrNone(list) {
        return (list && list.length) ? list.join(', ') : 'None';
    }

    function getDefaultInfo() {
        var html = '';
        html += '<div class="info-title">' + safeText(systemMeta.system_name, 'Unknown System') + '</div>';
        var origAuthor = safeText(systemMeta.original_author, 'Unknown');
        var lastAuthor = safeText(systemMeta.last_author, '');
        var authorLine = origAuthor;
        if (lastAuthor && lastAuthor !== origAuthor) {
            authorLine = origAuthor + ' & ' + lastAuthor;
        }
        var allAuthors = (systemMeta.all_authors && systemMeta.all_authors.length)
            ? systemMeta.all_authors.join(', ')
            : authorLine;
        var focus = safeText(systemMeta.focus, 'None');
        var exportsText = listOrNone(systemMeta.exports);
        var pirate = (systemMeta.intel && systemMeta.intel.pirate) ? systemMeta.intel.pirate : 'Unknown';
        var enemy = (systemMeta.intel && systemMeta.intel.enemy) ? systemMeta.intel.enemy : 'Unknown';
        var assets = (systemMeta.assets && systemMeta.assets.length) ? systemMeta.assets : [];
        html += '<div class="info-meta-block author-hover" data-authors="' + allAuthors + '">';
        html += '<div class="info-meta">Cartographers: ' + authorLine + '</div>';
        html += '<div class="info-meta">Version: ' + safeText(systemMeta.version_tag, 'unknown') + '</div>';
        html += '</div>';
        html += '<div class="info-desc">' + (systemMeta.description || 'No description available.') + '</div>';
        html += '<div class="info-section"><strong>System Focus:</strong> ' + focus + '</div>';
        html += '<div class="info-section"><strong>Intel:</strong></div>';
        html += '<div>' +
            '<img src="Images/SysBadges/' + pirate + 'Pirate.png" width="50" height="50" alt="' + pirate + ' Pirate" /> ' +
            '<img src="Images/SysBadges/' + enemy + 'Enemy.png" width="50" height="50" alt="' + enemy + ' Enemy" />' +
            '</div>';
        html += '<div>Pirate Activity: ' + pirate + '</div>';
        html += '<div>Enemy Activity: ' + enemy + '</div>';
        html += '<div class="info-section"><strong>Important Assets:</strong></div>';
        html += '<div class="asset-icons">' +
            assets.map(function(a) {
                return '<img src="Images/SysBadges/' + a + '.png" width="50" height="50" alt="' + a + '" title="' + a + '" />';
            }).join('') +
            '</div>';
        html += '<div class="asset-text">' +
            assets.map(function(a) { return '<div>' + a + '</div>'; }).join('') +
            '</div>';
        html += '<div class="info-section"><strong>Exports:</strong> ' + exportsText + '</div>';
        return html;
    }

    function bindGalacticButton() {
        var btn = document.getElementById('galactic-map-btn');
        if (btn) {
            btn.onclick = function() {
                window.location.href = 'index.html';
            };
        }
    }

    function setDefaultInfo() {
        document.getElementById('info').innerHTML = getInfoHeader() + getDefaultInfo();
        bindGalacticButton();
        attachAuthorHover();
    }

    function clearAnnotations() {
        Plotly.relayout('plot', {annotations: []});
        setDefaultInfo();
    }
    
    function getInfoHeader() {
    return '<img src="Images/Compass.png" alt="Compass" '
         + 'style="display:block; max-width:100%; height:auto; margin-bottom:10px;">'
         + '<button id="galactic-map-btn" title="Back to Galactic Map">Galactic Map</button>';
        }
    
    function highlight(name) {
        var obj = objData[name];
        if (obj.hidden && !isGM()) {
            alert("This object is not visible on the public map.");
            return;
        }
        var annotation = {
            x: obj.x, y: obj.y, xref: 'x', yref: 'y', text: name,
            showarrow: true, arrowcolor: 'yellow', arrowwidth: 2,
            arrowhead: 3, font: {color: 'yellow', size: 28}
        };

        Plotly.relayout('plot', {annotations: [annotation]});

        var label = obj.label || name;
        var infoHtml = '<span style="font-size:20pt;">' + label + '</span><br>';
        infoHtml += '<b>Location:</b> ' + obj.grid + '<br>';

        if (obj.type === 'station') {
            // Station selected: display detailed station info
            if (obj.hullImage) {
                infoHtml += '<img src="' + obj.hullImage + '" alt="Hull Art" style="max-width:48%; height:auto;">';
            }
            if (obj.sides && obj.sides.length > 0) {
                infoHtml += '<img src="Images/Factions/' + obj.sides[0] + '.png" alt="Faction Logo" style="max-width:48%; height:auto;">';
            }
            infoHtml += '<b>Facilities:</b> ' + (obj.facilities.length ? obj.facilities.join(', ') : 'None') + '<br>';
            if (obj.hullName && obj.hullImage) {
                infoHtml += '<b>General Class:</b> ' + obj.hullName + '<br>';
            }
            if (obj.hullDescription) {
                infoHtml += '<p class="hull-desc">' + obj.hullDescription + '</p>';
            }
        } 
        else if ((obj.type === 'jump_point' || obj.type === 'jumppoint' || obj.type === 'jumpnode') && obj.destinations && typeof obj.destinations === 'object') {
        
            // Generate a random 5-character alphanumeric serial
            const serial = Math.random().toString(36).substring(2, 7).toUpperCase();
            infoHtml += 'Oliver Class jump stabilisation node. Serial: ' + serial;
            infoHtml += '<br><br><b>Destinations:</b><br>';
            for (const [target, label] of Object.entries(obj.destinations)) {
                if (typeof target === 'string' && typeof label === 'string') {
                    let file = label + '.html';
                    // Correctly escape single quotes for JS string
                    infoHtml += `<button onclick="window.open('${file}', '_blank')">${label}, ${target}</button>`;
                }
            }
            }
        else if (obj.type === 'sensor_relay') {
            // Generate a random 5-character alphanumeric serial
            const serial = Math.random().toString(36).substring(2, 7).toUpperCase();
            infoHtml += 'Standard sensor and info relay buoy, Serial: ' + serial;
        }
        else if (obj.type === 'jumpnode' || obj.type === 'jumppoint') {
            // Generate a random 5-character alphanumeric serial
            const serial = Math.random().toString(36).substring(2, 7).toUpperCase();
            infoHtml += 'Oliver Class jump stabilisation node. Serial: ' + serial;
        }
        else if (obj.type === 'planet') {
            if (obj['class']) {
                infoHtml += '<b>Class:</b> ' + obj['class'] + '<br>';
            }
        }
        else {
            infoHtml += '<b>Type:</b> ' + obj.type;
        }

            // ——— append a description paragraph if one exists ———
            if (obj.description) {
                infoHtml += '<p class="desc-text">'
                          + obj.description
                          + '</p>';
            }
            document.getElementById('info').innerHTML = getInfoHeader() + infoHtml;
            bindGalacticButton();
            attachAuthorHover();
            openInfoPanel();
                + infoHtml;
         
    }
         bindGalacticButton();

        var gridSize = 20000;

        var originZ = 280000;
        var dx = Math.floor((x - originX) / gridSize);
        var dz = Math.floor((y - originZ) / gridSize);
        function posMod(n, mod) {
            return ((n % mod) + mod) % mod;
        }
        var col = posMod(dx, 100);
        var row = posMod(dz, 26);

        var number = String(col).padStart(2, '0');

            var mouseX = evt.clientX - rect.left;

            var x = axisPixelToData(full.xaxis, xpx);

    buttons.forEach(btn => {
      const label = btn.textContent.toLowerCase();
      const isHeader = btn.classList.contains('header');
      if (isHeader) {
        btn.style.display = ''; // always show section headers
      } else {
        btn.style.display = label.includes(query) ? '' : 'none';
      }
    });
  });
</script>
</body>
</html>
