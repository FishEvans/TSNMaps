    <style>
        html, body { margin: 0; height: 100%; background: black; color: white; }
        /* === Description typography controls ===
           Tweak these two variables to change description sizes globally */
        :root {
            --desc-font-size: 130%;
            --hull-desc-font-size: 130%;
            --panel-bg: #24272d;
            --panel-border: rgba(255, 255, 255, 0.08);
            --toolbar-bg: rgba(12, 14, 18, 0.92);
            --toolbar-border: rgba(255, 255, 255, 0.12);
            --mobile-toolbar-height: 58px;
        }
        body { display: flex; height: 100vh; overflow: hidden; position: relative; }
        .desc-text { font-size: var(--desc-font-size); margin-top: 8px; }
        .hull-desc { font-size: var(--hull-desc-font-size); margin-top: 5px; color: #ccc; }
        .info-title { font-size: 26px; font-weight: bold; text-align: center; margin: 2px 0 6px; }
        .info-desc { font-size: 16px; color: #fff; }
        .info-meta { font-size: 12px; color: #ccc; }
        .info-meta-block { margin-bottom: 6px; }
        .info-section { margin-top: 6px; }
        #controls, #info {
            background: linear-gradient(180deg, rgba(43, 47, 56, 0.98), rgba(28, 31, 38, 0.98));
            border-right: 1px solid var(--panel-border);
            overflow-y: auto;
            padding: 10px 12px;
            box-sizing: border-box;
            scrollbar-gutter: stable;
        }
        #controls { flex: 1; min-width: 220px; max-width: 350px; }
        #plot {
            flex: 3;
            min-width: 0;
            position: relative;
            background:
                radial-gradient(circle at top, rgba(0, 188, 212, 0.12), transparent 38%),
                radial-gradient(circle at bottom, rgba(255, 196, 0, 0.08), transparent 34%),
                #050608;
        }
        #info {
            flex: 1;
            min-width: 240px;
            border-right: none;
            border-left: 1px solid var(--panel-border);
        }
        #mobile-toolbar {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 30;
            height: var(--mobile-toolbar-height);
            padding: env(safe-area-inset-top, 0) 12px 10px;
            background: var(--toolbar-bg);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--toolbar-border);
            box-sizing: border-box;
            align-items: center;
            gap: 10px;
        }
        #mobile-title {
            flex: 1;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .mobile-toggle {
            width: auto;
            min-width: 86px;
            margin: 0;
            padding: 10px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            text-align: center;
        }
        #panel-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 25;
            background: rgba(3, 5, 9, 0.58);
            backdrop-filter: blur(3px);
        }
        #grid-readout {
            position: absolute;
            display: none;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid #00bcd4;
            border-radius: 4px;
            color: #00e5ff;
            font-weight: bold;
            font-size: 16px;
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
        }
        #author-tooltip {
            position: absolute;
            display: none;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid #00bcd4;
            border-radius: 4px;
            color: #00e5ff;
            font-weight: bold;
            font-size: 16px;
            pointer-events: none;
            z-index: 11;
            white-space: nowrap;
        }
        h2.header { margin-top: 0; margin-bottom: 5px; text-align: center; }
        h3.subheader { margin-top: 0; margin-bottom: 15px; text-align: center; color: #ccc; }
        .alignment-image { display: block; max-width: 100%; height: auto; margin: 10px auto; }
        button {
            display: block;
            width: 100%;
            margin-bottom: 5px;
            background: #555;
            color: white;
            border: none;
            padding: 8px 10px;
            text-align: left;
            cursor: pointer;
            font-size: 20px;
            border-radius: 10px;
        }
        button.header { background: #444; cursor: default; font-size: 24px; }
        #search-box {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 10px;
            font-size: 16px;
            box-sizing: border-box;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.06);
            color: white;
        }
        #search-box::placeholder { color: rgba(255, 255, 255, 0.6); }
        @media (max-width: 900px) {
            body { display: block; }
            #mobile-toolbar { display: flex; }
            #controls, #info {
                position: fixed;
                top: 0;
                bottom: 0;
                z-index: 40;
                width: min(86vw, 360px);
                max-width: none;
                min-width: 0;
                padding:
                    calc(var(--mobile-toolbar-height) + env(safe-area-inset-top, 0) + 12px)
                    14px
                    calc(18px + env(safe-area-inset-bottom, 0));
                box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
                transition: transform 0.24s ease;
            }
            #controls {
                left: 0;
                border-right: 1px solid var(--panel-border);
                transform: translateX(-104%);
            }
            #info {
                right: 0;
                border-left: 1px solid var(--panel-border);
                transform: translateX(104%);
            }
            body.drawer-left-open #controls { transform: translateX(0); }
            body.drawer-right-open #info { transform: translateX(0); }
            body.drawer-left-open #panel-overlay,
            body.drawer-right-open #panel-overlay { display: block; }
            #plot {
                position: fixed;
                inset: 0;
                width: 100vw;
                height: 100vh;
            }
            .info-title { font-size: 22px; }
            .info-desc, .desc-text, .hull-desc { font-size: 15px; }
            button { font-size: 17px; }
            button.header { font-size: 20px; }
        }
    </style>
</head>

    function isMobileLayout() {
        return window.matchMedia('(max-width: 900px)').matches;
    }

    function closePanels() {
        pageBody.classList.remove('drawer-left-open', 'drawer-right-open');
        syncMobileToggles();
    }

    function openControlsPanel() {
        if (!isMobileLayout()) return;
        pageBody.classList.add('drawer-left-open');
        pageBody.classList.remove('drawer-right-open');
        syncMobileToggles();
    }

    function openInfoPanel() {
        if (!isMobileLayout()) return;
        pageBody.classList.add('drawer-right-open');
        pageBody.classList.remove('drawer-left-open');
        syncMobileToggles();
    }

    function toggleControlsPanel() {
        if (!isMobileLayout()) return;
        var willOpen = !pageBody.classList.contains('drawer-left-open');
        closePanels();
        if (willOpen) {
            pageBody.classList.add('drawer-left-open');
        }
        syncMobileToggles();
    }

    function toggleInfoPanel() {
        if (!isMobileLayout()) return;

        closePanels();
        if (willOpen) {

        }

    function syncMobileToggles() {
        var controlsBtn = document.getElementById('mobile-controls-btn');
        var infoBtn = document.getElementById('mobile-info-btn');
        if (!controlsBtn || !infoBtn) return;
        controlsBtn.setAttribute('aria-expanded', pageBody.classList.contains('drawer-left-open') ? 'true' : 'false');
        infoBtn.setAttribute('aria-expanded', pageBody.classList.contains('drawer-right-open') ? 'true' : 'false');

    function safeText(value, fallback) {
        if (value === undefined || value === null || value === '') return fallback;
        return value;

    function listOrNone(list) {
        return (list && list.length) ? list.join(', ') : 'None';
    }

    function getDefaultInfo() {
        var html = '';
        html += '<div class="info-title">' + safeText(systemMeta.system_name, 'Unknown System') + '</div>';

hoverinfo": "text", "text": ["Braknor"], "textposition": "top center", "textfont": {"color": "white", "size": 14}, "meta": {"base_marker_size": 6, "base_text_size": 14}}], "layout": {"title": "Cronus", "paper_bgcolor": "black", "plot_bgcolor": "black", "font": {"color": "white"}, "margin": {"l": 0, "r": 0, "t": 40, "b": 0}, "autosize": true, "dragmode": "pan", "hovermode": "closest", "xaxis": {"color": "white", "showgrid": true, "gridcolor": "gray", "dtick": 20000, "title": "X Axis"}, "yaxis": {"color": "white", "showgrid": true, "gridcolor": "gray", "dtick": 20000, "scaleanchor": "x", "scaleratio": 1, "title": "Z Axis"}, "shapes": []}};
    fig.layout.showlegend = false;
    fig.layout.dragmode = 'pan';
    fig.layout.title = 'Cronus';
    if (!isGM()) {
        fig.data = fig.data.filter(t => !t.gmOnly);
        }
    setDefaultInfo();
    Plotly.newPlot('plot', fig.data, fig.layout, {responsive: true, scrollZoom: true});
        console.log("[DEBUG JS] Plotted traces count:", fig.data.length);
        console.log("[DEBUG JS] fig.data sample:", fig.data.slice(0,3));

    var plotDiv = document.getElementById('plot');
    // Use Plotly's built-in nearest-point selection for accurate clicks
    plotDiv.on('plotly_click', function(ev) {
        if (!ev || !ev.points || !ev.points.length) return;
        var p = ev.points[0];
        var picked = null;
        // Prefer original name from hovertext: "Name [Grid]"
        if (p.hovertext && typeof p.hovertext === 'string') {
            picked = p.hovertext.split(' [')[0];
        } else if (p.text && typeof p.text === 'string') {
            // Fallback to text label (strip any ** used for GM marking)
            picked = p.text.replace(/\*/g, '');
        }
        if (picked && objData[picked]) {
            highlight(picked);
            lastPlotlyClickTs = Date.now();
        }
    });

    plotDiv.on('plotly_clickmiss', function() {
        clearAnnotations();
    });

    function isPlotPointTarget(target) {
        if (!target || !target.closest) return false;
        return !!target.closest('.point, .textpoint, .text, .hovertext, .hoverlayer');
    }

    var clickStart = null;
    var dragged = false;
    var lastPlotlyClickTs = 0;
    plotDiv.addEventListener('mousedown', function(ev) {
        clickStart = {x: ev.clientX, y: ev.clientY};
        dragged = false;
    });
    plotDiv.addEventListener('mousemove', function(ev) {
        if (!clickStart) return;
        var dx = ev.clientX - clickStart.x;
        var dy = ev.clientY - clickStart.y;
        if ((dx * dx + dy * dy) > 25) dragged = true;
    });
    plotDiv.addEventListener('click', function(ev) {
        if (Date.now() - lastPlotlyClickTs < 250) return;
        if (dragged) return;
        if (isPlotPointTarget(ev.target)) return;
        closePanels();
        clearAnnotations();
    }, true);

    function gridRefFromXY(x, y) {
        var gridSize = 20000;
        var originX = -240000;
        var originZ = 280000;
        var dx = Math.floor((x - originX) / gridSize);
        var dz = Math.floor((y - originZ) / gridSize);
        function posMod(n, mod) {
            return ((n % mod) + mod) % mod;
        }
        var col = posMod(dx, 100);
        var row = posMod(dz, 26);
        var letter = String.fromCharCode(65 + row);
        var number = String(col).padStart(2, '0');
        return letter + number;
    }

    function axisPixelToData(axis, px) {
        if (axis && typeof axis.p2d === 'function') return axis.p2d(px);
        if (axis && typeof axis.p2c === 'function') return axis.p2c(px);
        if (axis && typeof axis.p2l === 'function') return axis.p2l(px);
        return null;
    }

    var gridReadout = document.createElement('div');
    gridReadout.id = 'grid-readout';
    plotDiv.appendChild(gridReadout);
    var authorTooltip = document.createElement('div');
    authorTooltip.id = 'author-tooltip';
    document.body.appendChild(authorTooltip);

    function updateGridReadout(evt) {
        try {
            var full = plotDiv._fullLayout;
            if (!full || !full._size || !full.xaxis || !full.yaxis) return;
            var rect = plotDiv.getBoundingClientRect();
            var mouseX = evt.clientX - rect.left;
            var mouseY = evt.clientY - rect.top;
            var xpx = mouseX - full._size.l;
            var ypx = mouseY - full._size.t;
            if (xpx < 0 || ypx < 0 || xpx > full._size.w || ypx > full._size.h) {
                gridReadout.style.display = 'none';
                return;
            }
            var x = axisPixelToData(full.xaxis, xpx);
            var y = axisPixelToData(full.yaxis, ypx);
            if (!isFinite(x) || !isFinite(y)) {
                gridReadout.style.display = 'none';
                return;
            }
            gridReadout.textContent = gridRefFromXY(x, y);
            gridReadout.style.left = (mouseX + 12) + 'px';
            gridReadout.style.top = (mouseY + 12) + 'px';
            gridReadout.style.display = 'block';
        } catch (e) {
            gridReadout.style.display = 'none';
        }
    }

    plotDiv.addEventListener('mousemove', updateGridReadout);
    plotDiv.addEventListener('mouseleave', function() {
        gridReadout.style.display = 'none';
    });

    function attachAuthorHover() {
        var info = document.getElementById('info');
        if (!info) return;
        var target = info.querySelector('.author-hover');
        if (!target) return;
        target.addEventListener('mousemove', function(ev) {
            var authors = target.getAttribute('data-authors') || '';
            if (!authors) {
                authorTooltip.style.display = 'none';
                return;
            }
            authorTooltip.textContent = authors;
            authorTooltip.style.left = (ev.clientX + 12) + 'px';
            authorTooltip.style.top = (ev.clientY + 12) + 'px';
            authorTooltip.style.display = 'block';
        });
        target.addEventListener('mouseleave', function() {
            authorTooltip.style.display = 'none';
        });
    }

    // ——— Auto-scale markers based on current zoom/span (optimized: planets & blackholes only) ———
    (function() {
        var refSpan = null;
        var planetIdx = [];
        var bhIdx = [];
        function rescaleMarkers() {
            try {
                var full = plotDiv._fullLayout || {};
                var xaxis = full.xaxis || (fig.layout && fig.layout.xaxis);
                if (!xaxis || !xaxis.range) return;
                var curr = Math.abs(xaxis.range[1] - xaxis.range[0]);
                if (!curr) return;
                if (!refSpan) refSpan = curr;
                var scale = refSpan / curr;
                var indices = [];
                var markerSizes = [];
                var textSizes = [];
                function pushForIndex(i) {
                    var t = fig.data[i];
                    if (!t || !t.meta || !t.meta.base_marker_size) return;
                    var base = t.meta.base_marker_size;
                    var baseText = t.meta.base_text_size || (t.textfont && t.textfont.size) || 12;
                    var newMarker = Math.max(2, Math.round(base * scale));
                    var newText = Math.max(8, Math.round(baseText * Math.sqrt(scale)));
                    indices.push(i);
                    markerSizes.push(newMarker);
                    textSizes.push(newText);
                }
                planetIdx.forEach(pushForIndex);
                bhIdx.forEach(pushForIndex);
                if (indices.length) {
                    Plotly.restyle(plotDiv, {'marker.size': [markerSizes], 'textfont.size': [textSizes]}, indices);
                }
            } catch (e) { console.error(e); }
        }
        // initial scale after plot settles
        setTimeout(rescaleMarkers, 250);
        plotDiv.on('plotly_relayout', rescaleMarkers);
    })();

  var ctrl = document.getElementById('object-buttons');

  // Helper: create and append a single button
function addButton(label, fn, header, color, isHidden) {
    if (isHidden && !isGM()) return;
    var btn = document.createElement('button');
    btn.textContent = label;
    if (header) {
      btn.className = 'header';     // section header style
      btn.onclick = null;           // no click action
    } else {
      btn.onclick = fn;             // bind the handler
      if (color) btn.style.backgroundColor = color;
    }
    ctrl.appendChild(btn);
  }
  
  function enterGMMode() {
    const pw = prompt("Enter ONI Auth Code: --We will store a cookie for the purpose of tracking if you have authenticated or not--");
    if (pw === "oni1") {
      document.cookie = "gmMode=1; path=/; max-age=31536000";
      location.reload();
    } else {
      alert("Incorrect password.");
    }
  }

  function isGM() {
    return document.cookie.split(';').some(c => c.trim() === 'gmMode=1');
  }

  function exitGMMode() {
    document.cookie = "gmMode=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC;";
    location.reload();
  }

  function renderGMControls() {
    const div = document.getElementById('gm-controls');
    div.innerHTML = '';
    const btn = document.createElement('button');
    btn.style.width = '100%';
    if (isGM()) {
      btn.textContent = 'ONI Logout';
      btn.onclick = exitGMMode;
    } else {
      btn.textContent = 'ONI Login';
      btn.onclick = enterGMMode;
    }
    div.appendChild(btn);
  }

  renderGMControls();

  document.getElementById('mobile-controls-btn').addEventListener('click', toggleControlsPanel);
  document.getElementById('mobile-info-btn').addEventListener('click', toggleInfoPanel);
  document.getElementById('panel-overlay').addEventListener('click', closePanels);
  document.addEventListener('keydown', function(ev) {
    if (ev.key === 'Escape') closePanels();
  });
  window.addEventListener('resize', function() {
    if (!isMobileLayout()) {
      closePanels();
    } else {
      syncMobileToggles();
    }
  });
  syncMobileToggles();

    addButton('--- Planets ---', null, true, null);
    

    addButton('--- Stations ---', null, true, null);
    addButton('Fortress Krundar',function(){highlight('Fortress Krundar');},false,'red',true)
    addButton('Nexus Grondal',function(){highlight('Nexus Grondal');},false,'red',true)
    addButton('Zarkhull',function(){highlight('Zarkhull');},false,'red',true)
    
  // Search filter
  document.getElementById('search-box').addEventListener('input', function() {
    const query = this.value.toLowerCase();
    const buttons = document.querySelectorAll('#object-buttons button');
    buttons.forEach(btn => {
      const label = btn.textContent.toLowerCase();
      const isHeader = btn.classList.contains('header');
      if (isHeader) {
        btn.style.display = ''; // always show section headers
      } else {
        btn.style.display = label.includes(query) ? '' : 'none';
      }
    });
  });
