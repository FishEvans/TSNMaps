            scrollbar-gutter: stable;

            color: #00e5ff;

            font-size: 16px;

            #controls {
                left: 0;

            #info {
                right: 0;
                border-left: 1px solid var(--panel-border);
                transform: translateX(104%);
            }
            body.drawer-left-open #controls { transform: translateX(0); }
            body.drawer-right-open #info { transform: translateX(0); }
            body.drawer-left-open #panel-overlay,
            body.drawer-right-open #panel-overlay { display: block; }
            #plot {
                position: fixed;
                inset: 0;
                width: 100vw;
                height: 100vh;
            }
            .info-title { font-size: 22px; }
            .info-desc, .desc-text, .hull-desc { font-size: 15px; }
            button { font-size: 17px; }
            button.header { font-size: 20px; }
        }
    </style>

atform offers a stable power supply for some of the longest-range beams the USFP knows how to construct. Often found at sites of particular importance to the USFP, its design was stolen a number of years ago."}, "defense_platform_torp (station)": {"type": "station", "x": 2000.0, "y": 2000.0, "grid": "M12", "hidden": false, "label": "defense_platform_torp (station)", "hull": "defense_platform_torp", "facilities": [], "sides": ["USFP"], "hullName": "Torpedo Platform", "hullImage": "Images/Ships/TSN Mod/USFP/DefensePlatTorp256.png", "hullDescription": "Defensive torpedo battery. Has a large supply of standardised torpedoes. Not especially threatening to a military ship, but very persistent and has a wide area of influence."}, "defense_platform_fighter (station)": {"type": "station", "x": 3000.0, "y": 2000.0, "grid": "M12", "hidden": false, "label": "defense_platform_fighter (station)", "hull": "defense_platform_fighter", "facilities": [], "sides": ["USFP"], "hullName": "Fighter Platform", "hullImage": "Images/Ships/TSN Mod/USFP/DefensePlatFighter256.png", "hullDescription": "The Allard Industries Fighter Platform is a high-tech mini station designed exclusively as a defensive or patrol point base for light in-system shuttles and combat craft. Often used by the USFP Customs Agency at borders to house inspection craft or at military facilities to provide a greater patrol and defence installation than torpedo or beam batteries."}, "usfp_industrial_unit (station)": {"type": "station", "x": 4000.0, "y": 2000.0, "grid": "M12", "hidden": false, "label": "usfp_industrial_unit (station)", "hull": "usfp_industrial_unit", "facilities": [], "sides": ["USFP"], "hullName": "Industrial Unit", "hullImage": "Images/Ships/TSN Mod/USFP/IndustrialUnit256.png", "hullDescription": "Unity Class Industrial Unit. This is basically a large box where all sorts of additive and reductive processing occurs to produce components or finished items. Typically has a large wing for design."}, "usfp_industrial_storage": {"type": "station", "x": 5000.0, "y": 2000.0, "grid": "M12", "hidden": false, "label": "usfp_industrial_storage", "hull": "usfp_industrial_storage", "facilities": [], "sides": ["USFP"], "hullName": "Storage Module", "hullImage": "Images/Ships/TSN Mod/USFP/IndustrialStorage256.png", "hullDescription": "This is a storage area for nearby stations and industrial facilities. Rarely has anything more than a basic docking system and is typically private."}, "usfp_industrial_refinary (station)": {"type": "station", "x": 6000.0, "y": 2000.0, "grid": "M12", "hidden": false, "label": "usfp_industrial_refinary (station)", "hull": "usfp_industrial_refinary", "facilities": [], "sides": ["USFP"], "hullName": "Refinary Unit", "hullImage": "Images/Ships/TSN Mod/USFP/IndustrialRefinary256.png", "hullDescription": "This large unit is designed to break down raw asteroids into useful materials; half of the USFP is built from outputs of units like this."}, "usfp_industrial_processor (station)": {"type": "station", "x": 7000.0, "y": 2000.0, "grid": "M12", "hidden": false, "label": "usfp_industrial_processor (station)", "hull": "usfp_industrial_processor", "facilities": [], "sides": ["USFP"], "hullName": "Processor Unit", "hullImage": "Images/Ships/TSN Mod/USFP/IndustrialProcessor256.png", "hullDescription": "The Theros Type Industrial Processor, useful for creating many types of components out of refined bar stock, or simply the industrial-scale manufacturing of simple items."}, "usfp_industrial_assembly (station)": {"type": "station", "x": 8000.0, "y": 2000.0, "grid": "M12", "hidden": false, "label": "usfp_industrial_assembly (station)", "hull": "usfp_industrial_assembly", "facilities": [], "sides": ["USFP"], "hullName": "Assembly Yard", "hullImage": "Images/Ships/TSN Mod/USFP/IndustrialAssembler256.png", "hullDescription": "This is a Bidilin Class modular Industrial Assembly Unit. It specialises in final assembly of goods from components, from home appliances to lab equ     function gridRefFromXY(x, y) {
        var gridSize = 20000;
        var originX = -240000;
        var originZ = 280000;
        var dx = Math.floor((x - originX) / gridSize);
        var dz = Math.floor((y - originZ) / gridSize);
        function posMod(n, mod) {
            return ((n % mod) + mod) % mod;
        }
        var col = posMod(dx, 100);
        var row = posMod(dz, 26);
        var letter = String.fromCharCode(65 + row);
        var number = String(col).padStart(2, '0');
        return letter + number;
    }

    function axisPixelToData(axis, px) {
        if (axis && typeof axis.p2d === 'function') return axis.p2d(px);
        if (axis && typeof axis.p2c === 'function') return axis.p2c(px);
        if (axis && typeof axis.p2l === 'function') return axis.p2l(px);
        return null;
    }

    function updateGridReadout(evt) {
        try {
            var full = plotDiv._fullLayout;
            if (!full || !full._size || !full.xaxis || !full.yaxis) return;
            var rect = plotDiv.getBoundingClientRect();
            var mouseX = evt.clientX - rect.left;
            var mouseY = evt.clientY - rect.top;
            var xpx = mouseX - full._size.l;
            var ypx = mouseY - full._size.t;
            if (xpx < 0 || ypx < 0 || xpx > full._size.w || ypx > full._size.h) {
                gridReadout.style.display = 'none';
                return;
            }
            var x = axisPixelToData(full.xaxis, xpx);
            var y = axisPixelToData(full.yaxis, ypx);
            if (!isFinite(x) || !isFinite(y)) {
                gridReadout.style.display = 'none';
                return;
            }
            gridReadout.textContent = gridRefFromXY(x, y);
            gridReadout.style.left = (mouseX + 12) + 'px';
            gridReadout.style.top = (mouseY + 12) + 'px';
            gridReadout.style.display = 'block';
        } catch (e) {
            gridReadout.style.display = 'none';
        }
    }

    plotDiv.addEventListener('mousemove', updateGridReadout);
    plotDiv.addEventListener('mouseleave', function() {
        gridReadout.style.display = 'none';

    // ——— Auto-scale markers based on current zoom/span (optimized: planets & blackholes only) ———
    (function() {
        var refSpan = null;
        var scalableIdx = fig.data
            .map(function(t, i) { return t && t.meta && t.meta.scale_on_zoom ? i : null; })
            .filter(function(i) { return i !== null; });
        function rescaleMarkers() {
            try {
                var full = plotDiv._fullLayout || {};
                var xaxis = full.xaxis || (fig.layout && fig.layout.xaxis);
                if (!xaxis || !xaxis.range) return;
                var curr = Math.abs(xaxis.range[1] - xaxis.range[0]);
                if (!curr) return;
                if (!refSpan) refSpan = curr;
                var scale = refSpan / curr;
                var indices = [];
                var markerSizes = [];
                var textSizes = [];
                function pushForIndex(i) {
                    var t = fig.data[i];
                    if (!t || !t.meta || !t.meta.base_marker_size) return;
                    var base = t.meta.base_marker_size;
                    var baseText = t.meta.base_text_size || (t.textfont && t.textfont.size) || 12;
                    var newMarker = Math.max(2, Math.round(base * scale));
                    var newText = Math.max(8, Math.round(baseText * Math.sqrt(scale)));
                    indices.push(i);
                    markerSizes.push(newMarker);
                    textSizes.push(newText);
                }
                scalableIdx.forEach(pushForIndex);
                if (indices.length) {
                    Plotly.restyle(plotDiv, {'marker.size': markerSizes, 'textfont.size': textSizes}, indices);
                }
            } catch (e) { console.error(e); }
        }
        // initial scale after plot settles
        setTimeout(rescaleMarkers, 250);
        plotDiv.on('plotly_relayout', rescaleMarkers);
    })();

function addButton(label, fn, header, color, isHidden) {
    if (isHidden && !isGM()) return;
    var btn = document.createElement('button');
    btn.textContent = label;
    if (header) {
      btn.className = 'header';     // section header style
      btn.dataset.section = label;
      btn.onclick = null;           // no click action
    } else {
      btn.onclick = fn;             // bind the handler
      if (color) btn.style.backgroundColor = color;
      if (activeSection) btn.dataset.section = activeSection;
    }
    ctrl.appendChild(btn);
  }

  function addSection(label, populate) {
    var before = ctrl.children.length;
    addButton(label, null, true, null);
    var header = ctrl.children[ctrl.children.length - 1];
    var previousSection = activeSection;
    activeSection = label;
    if (typeof populate === 'function') {
      populate();
    }
    activeSection = previousSection;
    var added = ctrl.children.length - before - 1;
    if (added <= 0 && header && header.parentNode === ctrl) {
      ctrl.removeChild(header);
    }
  }

        btn.style.display = 'none';
      } else {
        btn.style.display = label.includes(query) ? '' : 'none';
      }
    });
    buttons
      .filter(btn => btn.classList.contains('header'))
      .forEach(header => {
        const section = header.dataset.section;
        const hasVisibleEntry = buttons.some(btn =>
          !btn.classList.contains('header') &&
          btn.dataset.section === section &&
          btn.style.display !== 'none'
        );
        header.style.display = hasVisibleEntry ? '' : 'none';
      });
  });
</script>
</body>
