        return (list && list.length) ? list.join(', ') : 'None';
    }

    function getDefaultInfo() {
        var html = '';
        html += '<div class="info-title">' + safeText(systemMeta.system_name, 'Unknown System') + '</div>';
        var origAuthor = safeText(systemMeta.original_author, 'Unknown');
        var lastAuthor = safeText(systemMeta.last_author, '');
        var authorLine = origAuthor;
        if (lastAuthor && lastAuthor !== origAuthor) {
            authorLine = origAuthor + ' & ' + lastAuthor;
        }
        var allAuthors = (systemMeta.all_authors && systemMeta.all_authors.length)
            ? systemMeta.all_authors.join(', ')
            : authorLine;
        var focus = safeText(systemMeta.focus, 'None');
        var exportsText = listOrNone(systemMeta.exports);
        var pirate = (systemMeta.intel && systemMeta.intel.pirate) ? systemMeta.intel.pirate : 'Unknown';
        var enemy = (systemMeta.intel && systemMeta.intel.enemy) ? systemMeta.intel.enemy : 'Unknown';
        var assets = (systemMeta.assets && systemMeta.assets.length) ? systemMeta.assets : [];
        html += '<div class="info-meta-block author-hover" data-authors="' + allAuthors + '">';
        html += '<div class="info-meta">Cartographers: ' + authorLine + '</div>';
        html += '<div class="info-meta">Version: ' + safeText(systemMeta.version_tag, 'unknown') + '</div>';
        html += '</div>';
        html += '<div class="info-desc">' + (systemMeta.description || 'No description available.') + '</div>';
        html += '<div class="info-section"><strong>System Focus:</strong> ' + focus + '</div>';
        html += '<div class="info-section"><strong>Intel:</strong></div>';
        html += '<div>' +
            '<img src="Images/SysBadges/' + pirate + 'Pirate.png" width="50" height="50" alt="' + pirate + ' Pirate" /> ' +
            '<img src="Images/SysBadges/' + enemy + 'Enemy.png" width="50" height="50" alt="' + enemy + ' Enemy" />' +
            '</div>';
        html += '<div>Pirate Activity: ' + pirate + '</div>';
        html += '<div>Enemy Activity: ' + enemy + '</div>';
        html += '<div class="info-section"><strong>Important Assets:</strong></div>';
        html += '<div class="asset-icons">' +
            assets.map(function(a) {
                return '<img src="Images/SysBadges/' + a + '.png" width="50" height="50" alt="' + a + '" title="' + a + '" />';
            }).join('') +
            '</div>';
        html += '<div class="asset-text">' +
            assets.map(function(a) { return '<div>' + a + '</div>'; }).join('') +
            '</div>';
        html += '<div class="info-section"><strong>Exports:</strong> ' + exportsText + '</div>';
        return html;
    }

    function bindGalacticButton() {
        var btn = document.getElementById('galactic-map-btn');
        if (btn) {
            btn.onclick = function() {
                window.location.href = 'index.html';
            };
        }
    }

    function setDefaultInfo() {
        document.getElementById('info').innerHTML = getInfoHeader() + getDefaultInfo();
        bindGalacticButton();
        attachAuthorHover();
    }

    function clearAnnotations() {
        Plotly.relayout('plot', {annotations: []});
        setDefaultInfo();
    }
    
    function getInfoHeader() {
    return '<img src="Images/Compass.png" alt="Compass" '
         + 'style="display:block; max-width:100%; height:auto; margin-bottom:10px;">'
         + '<button id="galactic-map-btn" title="Back to Galactic Map">Galactic Map</button>';
        }
    
    function highlight(name) {
        var obj = objData[name];
        if (obj.hidden && !isGM()) {
            alert("This object is not visible on the public map.");
            return;
        }
        var annotation = {
            x: obj.x, y: obj.y, xref: 'x', yref: 'y', text: name,
            showarrow: true, arrowcolor: 'yellow', arrowwidth: 2,
            arrowhead: 3, font: {color: 'yellow', size: 28}
        };

        Plotly.relayout('plot', {annotations: [annotation]});

        var label = obj.label || name;
        var infoHtml = '<span style="font-size:20pt;">' + label + '</span><br>';
        infoHtml += '<b>Location:</b> ' + obj.grid + '<br>';

        if (obj.type === 'station') {
            // Station selected: display detailed station info
            if (obj.hullImage) {
                infoHtml += '<img src="' + obj.hullImage + '" alt="Hull Art" style="max-width:48%; height:auto;">';
            }
            if (obj.sides && obj.sides.length > 0) {
                infoHtml += '<img src="Images/Factions/' + obj.sides[0] + '.png" alt="Faction Logo" style="max-width:48%; height:auto;">';
            }
            infoHtml += '<b>Facilities:</b> ' + (obj.facilities.length ? obj.facilities.join(', ') : 'None') + '<br>';
            if (obj.hullName && obj.hullImage) {
                infoHtml += '<b>General Class:</b> ' + obj.hullName + '<br>';
            }
            if (obj.hullDescription) {
                infoHtml += '<p class="hull-desc">' + obj.hullDescription + '</p>';
            }
        } 
        else if ((obj.type === 'jump_point' || obj.type === 'jumppoint' || obj.type === 'jumpnode') && obj.destinations && typeof obj.destinations === 'object') {
        
            // Generate a random 5-character alphanumeric serial
            const serial = Math.random().toString(36).substring(2, 7).toUpperCase();
            infoHtml += 'Oliver Class jump stabilisation node. Serial: ' + serial;
            infoHtml += '<br><br><b>Destinations:</b><br>';
            for (const [target, label] of Object.entries(obj.destinations)) {
                if (typeof target === 'string' && typeof label === 'string') {
                    let file = label + '.html';
                    // Correctly escape single quotes for JS string
                    infoHtml += `<button onclick="window.open('${file}', '_blank')">${label}, ${target}</button>`;
                }
            }
            }
        else if (obj.type === 'sensor_relay') {
            // Generate a random 5-character alphanumeric serial
            const serial = Math.random().toString(36).substring(2, 7).toUpperCase();
            const relayType = obj.relayType || 'Sensor Relay';
            infoHtml += '<b>Subtype:</b> ' + relayType + '<br>';
            if (relayType === 'Warning Buoy') {
                infoHtml += 'Warning buoy and hazard marker, Serial: ' + serial;
                if (obj.broadcast) {
                    infoHtml += '<br><b>Broadcast:</b> ' + obj.broadcast;
                }
                if (obj.ping !== undefined) {
                    infoHtml += '<br><b>Ping:</b> ' + obj.ping;
                }
                if (obj.range !== undefined) {
                    infoHtml += '<br><b>Range:</b> ' + obj.range;
                }
            } else {
                infoHtml += 'Standard sensor and info relay buoy, Serial: ' + serial;
            }
        }
        else if (obj.type === 'jumpnode' || obj.type === 'jumppoint') {
            // Generate a random 5-character alphanumeric serial
            const serial = Math.random().toString(36).substring(2, 7).toUpperCase();
            infoHtml += 'Oliver Class jump stabilisation node. Serial: ' + serial;
        }
        else if (obj.type === 'planet') {
            if (obj['class']) {
                infoHtml += '<b>Class:</b> ' + obj['class'] + '<br>';
            }
        }
        else if (obj.zoneLabel) {
            infoHtml += '<b>Type:</b> ' + obj.zoneLabel + '<br>';
            if (obj.radius !== undefined) {
                infoHtml += '<b>Radius:</b> ' + obj.radius + '<br>';
            }
        }
        else {
            infoHtml += '<b>Type:</b> ' + obj.type;
        }

            // ——— append a description paragraph if one exists ———
            if (obj.description) {
                infoHtml += '<p class="desc-text">'
                          + obj.description
                          + '</p>';
            }
            document.getElementById('info').innerHTML = getInfoHeader() + infoHtml;
            bindGalacticButton();
            attachAuthorHover();
            openInfoPanel();
                + infoHtml;
         
    }
         bindGalacticButton();

        if (!target || !target.closest) return false;
        return !!target.closest('.point, .textpoint, .text, .hovertext, .hoverlayer');
    }

    var clickStart = null;
    var dragged = false;
    var lastPlotlyClickTs = 0;
    plotDiv.addEventListener('mousedown', function(ev) {
        clickStart = {x: ev.clientX, y: ev.clientY};
        dragged = false;
    });
    plotDiv.addEventListener('mousemove', function(ev) {
        if (!clickStart) return;
        var dx = ev.clientX - clickStart.x;
        var dy = ev.clientY - clickStart.y;
        if ((dx * dx + dy * dy) > 25) dragged = true;
    });
    plotDiv.addEventListener('click', function(ev) {
        if (Date.now() - lastPlotlyClickTs < 250) return;
        if (dragged) return;
        if (isPlotPointTarget(ev.target)) return;
        closePanels();
        clearAnnotations();
    }, true);

    function gridRefFromXY(x, y) {
        var gridSize = 20000;
        var originX = -240000;
        var originZ = 280000;
        var dx = Math.floor((x - originX) / gridSize);
        var dz = Math.floor((y - originZ) / gridSize);
        function posMod(n, mod) {
            return ((n % mod) + mod) % mod;
        }
        var col = posMod(dx, 100);
        var row = posMod(dz, 26);
        var letter = String.fromCharCode(65 + row);
        var number = String(col).padStart(2, '0');
        return letter + number;
    }

    function axisPixelToData(axis, px) {
        if (axis && typeof axis.p2d === 'function') return axis.p2d(px);
        if (axis && typeof axis.p2c === 'function') return axis.p2c(px);
        if (axis && typeof axis.p2l === 'function') return axis.p2l(px);
        return null;
    }

    var gridReadout = document.createElement('div');
    gridReadout.id = 'grid-readout';
    plotDiv.appendChild(gridReadout);
    var authorTooltip = document.createElement('div');
    authorTooltip.id = 'author-tooltip';
    document.body.appendChild(authorTooltip);

    function updateGridReadout(evt) {
        try {
            var full = plotDiv._fullLayout;
            if (!full || !full._size || !full.xaxis || !full.yaxis) return;
            var rect = plotDiv.getBoundingClientRect();
            var mouseX = evt.clientX - rect.left;
            var mouseY = evt.clientY - rect.top;
            var xpx = mouseX - full._size.l;
            var ypx = mouseY - full._size.t;
            if (xpx < 0 || ypx < 0 || xpx > full._size.w || ypx > full._size.h) {
                gridReadout.style.display = 'none';
                return;
            }
            var x = axisPixelToData(full.xaxis, xpx);
            var y = axisPixelToData(full.yaxis, ypx);
            if (!isFinite(x) || !isFinite(y)) {
                gridReadout.style.display = 'none';
                return;
            }
            gridReadout.textContent = gridRefFromXY(x, y);
            gridReadout.style.left = (mouseX + 12) + 'px';
            gridReadout.style.top = (mouseY + 12) + 'px';
            gridReadout.style.display = 'block';
        } catch (e) {
            gridReadout.style.display = 'none';
        }
    }

    plotDiv.addEventListener('mousemove', updateGridReadout);
    plotDiv.addEventListener('mouseleave', function() {
        gridReadout.style.display = 'none';
    });

    function attachAuthorHover() {
        var info = document.getElementById('info');
        if (!info) return;
        var target = info.querySelector('.author-hover');
        if (!target) return;
        target.addEventListener('mousemove', function(ev) {
            var authors = target.getAttribute('data-authors') || '';
            if (!authors) {
                authorTooltip.style.display = 'none';
                return;
            }
            authorTooltip.textContent = authors;
            authorTooltip.style.left = (ev.clientX + 12) + 'px';
            authorTooltip.style.top = (ev.clientY + 12) + 'px';
            authorTooltip.style.display = 'block';
        });
        target.addEventListener('mouseleave', function() {
            authorTooltip.style.display = 'none';
        });
    }

    // ——— Auto-scale markers based on current zoom/span (optimized: planets & blackholes only) ———
    (function() {
        var refSpan = null;
        var scalableIdx = fig.data
            .map(function(t, i) { return t && t.meta && t.meta.scale_on_zoom ? i : null; })
            .filter(function(i) { return i !== null; });
        function rescaleMarkers() {
            try {
                var full = plotDiv._fullLayout || {};
                var xaxis = full.xaxis || (fig.layout && fig.layout.xaxis);
                if (!xaxis || !xaxis.range) return;
                var curr = Math.abs(xaxis.range[1] - xaxis.range[0]);
                if (!curr) return;
                if (!refSpan) refSpan = curr;
                var scale = refSpan / curr;
                var indices = [];
                var markerSizes = [];
                var textSizes = [];
                function pushForIndex(i) {
                    var t = fig.data[i];
                    if (!t || !t.meta || !t.meta.base_marker_size) return;
                    var base = t.meta.base_marker_size;
                    var baseText = t.meta.base_text_size || (t.textfont && t.textfont.size) || 12;
                    var newMarker = Math.max(2, Math.round(base * scale));
                    var newText = Math.max(8, Math.round(baseText * Math.sqrt(scale)));
                    indices.push(i);
                    markerSizes.push(newMarker);
                    textSizes.push(newText);
                }
                scalableIdx.forEach(pushForIndex);
                if (indices.length) {
                    Plotly.restyle(plotDiv, {'marker.size': markerSizes, 'textfont.size': textSizes}, indices);
                }
            } catch (e) { console.error(e); }
        }
        // initial scale after plot settles
        setTimeout(rescaleMarkers, 250);
        plotDiv.on('plotly_relayout', rescaleMarkers);
    })();

  var ctrl = document.getElementById('object-buttons');

  // Helper: create and append a single button
function addButton(label, fn, header, color, isHidden) {
    if (isHidden && !isGM()) return;
    var btn = document.createElement('button');
    btn.textContent = label;
    if (header) {
      btn.className = 'header';     // section header style
      btn.onclick = null;           // no click action
    } else {
      btn.onclick = fn;             // bind the handler
      if (color) btn.style.backgroundColor = color;
    }
    ctrl.appendChild(btn);
  }
  
  function enterGMMode() {
    const pw = prompt("Enter ONI Auth Code: --We will store a cookie for the purpose of tracking if you have authenticated or not--");
    if (pw === "oni1") {
      document.cookie = "gmMode=1; path=/; max-age=31536000";
      location.reload();
    } else {
      alert("Incorrect password.");
    }
  }

  function isGM() {
    return document.cookie.split(';').some(c => c.trim() === 'gmMode=1');
  }

  function exitGMMode() {
    document.cookie = "gmMode=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC;";
    location.reload();
  }

  function renderGMControls() {
    const div = document.getElementById('gm-controls');
    div.innerHTML = '';
    const btn = document.createElement('button');
    btn.style.width = '100%';
    if (isGM()) {
      btn.textContent = 'ONI Logout';
      btn.onclick = exitGMMode;
    } else {
      btn.textContent = 'ONI Login';
      btn.onclick = enterGMMode;
    }
    div.appendChild(btn);
  }

      } else {
        btn.style.display = label.includes(query) ? '' : 'none';
      }
    });
